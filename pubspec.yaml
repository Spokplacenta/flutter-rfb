description: A VNC / Remote Framebuffer / RFC 6143 client purely written in Dart/Flutter
homepage: https://github.com/Goddchen/flutter-vnc
name: flutter_rfb
repository: https://github.com/Goddchen/flutter-vnc
version: 0.7.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.16.0"

dependencies:
  dart_rfb:
    git:
      url: https://github.com/Spokplacenta/dart-rfb.git
      ref: main
  flutter:
    sdk: flutter
  # Même contrainte que dart_rfb (dépendance git ci-dessus) pour une seule résolution.
  fpdart: ^0.4.0
  freezed_annotation: ^2.4.4
  logging: ^1.2.0
  stream_transform: ^2.1.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7

flutter:
